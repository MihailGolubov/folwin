name: Deploy Folwin

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Upload files to Windows Server via SCP
        run: |
          echo "${{ secrets.SSH_KEY }}" > key.pem
          chmod 600 key.pem
          scp -r -P ${{ secrets.SSH_PORT }} -i key.pem ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/C:/Users/Administrator/folwin

      - name: Restart PM2 on Windows Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd "C:/Users/Administrator/folwin"
            pm2 restart folwin || pm2 start npm --name folwin -- start
