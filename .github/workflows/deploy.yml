name: Deploy Folwin

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Download WinSCP Portable (SourceForge mirror)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget -O winscp.zip "https://sourceforge.net/projects/winscp/files/WinSCP/6.3.2/WinSCP-6.3.2-Portable.zip/download"
          unzip winscp.zip -d winscp

      - name: Upload files to Windows Server via WinSCP
        run: |
          ./winscp/WinSCP.com /command \
            "open sftp://${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_PORT }} -privatekey=${{ secrets.SSH_KEY }}" \
            "put -delete ./ C:/Users/Administrator/folwin" \
            "exit"

      - name: Restart PM2 on Windows Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd "C:/Users/Administrator/folwin"
            pm2 restart folwin || pm2 start npm --name folwin -- start
