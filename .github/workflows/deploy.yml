name: Deploy Folwin

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Copy project to VPS (fără .git, fără node_modules)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "/Users/Administrator/Desktop/folwin"
          rm: false
          strip_components: 0
          overwrite: true
          exclude: |
            .git/
            node_modules/

      - name: Restart PM2 on VPS
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd C:/Users/Administrator/Desktop/folwin
            pm2 restart folwin || pm2 start npm --name folwin -- start

      - name: Notificare finală în GitHub
        uses: actions/github-script@v7
        with:
          script: |
            core.notice("🚀 Deploy complet pe VPS pentru Folwin!")
